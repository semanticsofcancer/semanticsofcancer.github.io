<div class="footer">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <div class="footer-inner">
          <h2 class="footer-title">{{site.title}}</h2>
          <ul>
	  	{% if site.data.contact.email %}
    		<div class="call-email"><strong>Email: </strong>
      		<a href="mailto:{{ .site.data.contact.email }}">
        	{{ site.data.contact.email }}
      		</a>
    		</div>
    		{% endif %}
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
